    <script>
      function getSubImageUrl(bigImage, index) {
        var canvas = document.createElement('canvas'), imgSize = 64, cols = 10;;
        canvas.height = canvas.width = imgSize;
        const sx = (index % cols) * imgSize, sy = Math.floor(index / cols) * imgSize;
        canvas.getContext('2d').drawImage(bigImage, sx, sy, imgSize, imgSize, 0, 0, imgSize, imgSize);
        return canvas.toDataURL('image/png');
      }
      var stitched_lite = new Image();
      stitched_lite.src = "../image/icon/lite/stitched_lite.png";
      stitched_lite.onload = function () {
        getByid("openFile").src = getSubImageUrl(stitched_lite, 17 - 1);
        getByid("MouseOperation").src = getSubImageUrl(stitched_lite, 84 - 1);
        getByid("b_Scroll").src = getSubImageUrl(stitched_lite, 98 - 1);
        getByid("SplitWindow").src = getSubImageUrl(stitched_lite, 76 - 1);
        getByid("openTransformationsImg").src = getSubImageUrl(stitched_lite, 103 - 1);
        getByid("WindowRevision").src = getSubImageUrl(stitched_lite, 111 - 1);
        getByid("zoom").src = getSubImageUrl(stitched_lite, 114 - 1);
        getByid("color_invert").src = getSubImageUrl(stitched_lite, 70 - 1);
        getByid("unlink").src = getSubImageUrl(stitched_lite, 118 - 1);
        getByid("resetImg").src = getSubImageUrl(stitched_lite, 64 - 1);
        getByid("openMeasureImg").src = getSubImageUrl(stitched_lite, 15 - 1);
        getByid("playvideo").src = getSubImageUrl(stitched_lite, 55 - 1);
        getByid("MarkButton").src = getSubImageUrl(stitched_lite, 4 - 1);
        getByid("annotation").src = getSubImageUrl(stitched_lite, 50 - 1);
        getByid("KOimg").src = getSubImageUrl(stitched_lite, 71 - 1);
        getByid("OtherImg").src = getSubImageUrl(stitched_lite, 102 - 1);

        getByid("removeAllRuler").src = getSubImageUrl(stitched_lite, 105 - 1);
        getByid("removeRuler").src = getSubImageUrl(stitched_lite, 33 - 1);
        getByid("eraseRuler").src = getSubImageUrl(stitched_lite, 66 - 1);
        getByid("MeasureRuler").src = getSubImageUrl(stitched_lite, 65 - 1);

        getByid("AngleRuler").src = getSubImageUrl(stitched_lite, 48 - 1);
        getByid("AngleRuler2").src = getSubImageUrl(stitched_lite, 49 - 1);
        getByid("RectRuler").src = getSubImageUrl(stitched_lite, 89 - 1);
        getByid("CircleRuler").src = getSubImageUrl(stitched_lite, 59 - 1);
        getByid("IrregularRuler").src = getSubImageUrl(stitched_lite, 14 - 1);
        getByid("ArrowRuler").src = getSubImageUrl(stitched_lite, 51 - 1);
        getByid("TextAnnotation").src = getSubImageUrl(stitched_lite, 26 - 1);

        getByid("OnlyShowKOImg").src = getSubImageUrl(stitched_lite, 74 - 1);
        getByid("LockKOImg").src = getSubImageUrl(stitched_lite, 73 - 1);
        getByid("clearviewportImg").src = getSubImageUrl(stitched_lite, 105 - 1);
        getByid("TrueSizeImg").src = getSubImageUrl(stitched_lite, 106 - 1);
        getByid("AboutImg").src = getSubImageUrl(stitched_lite, 69 - 1);

        getByid("horizontal_flip").src = getSubImageUrl(stitched_lite, 67 - 1);
        getByid("vertical_flip").src = getSubImageUrl(stitched_lite, 68 - 1);
        getByid("MouseRotate").src = getSubImageUrl(stitched_lite, 91 - 1);
        getByid("Rotate_0").src = getSubImageUrl(stitched_lite, 92 - 1);
        getByid("Rotate_i90").src = getSubImageUrl(stitched_lite, 93 - 1);
        getByid("Rotate_90").src = getSubImageUrl(stitched_lite, 96 - 1);
      }
